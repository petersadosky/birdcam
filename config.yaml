camera:
  resolution: [640, 480]
  fps: 5

detection:
  model: yolov8n.pt
  confidence_threshold: 0.5
  cooldown_seconds: 5
  buffer_seconds: 3

classifier:
  enabled: true
  max_requests_per_day: 200
  model: claude-haiku-4-5-20251001

storage:
  base_path: /mnt/birdcam
  thumbnail_width: 320
  prune_burst_after_days: 90

web:
  host: 0.0.0.0
  port: 8080
